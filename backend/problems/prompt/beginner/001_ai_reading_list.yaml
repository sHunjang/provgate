title: "리스트 슬라이싱 결과 예측"
level: "beginner"
concept_tag: "리스트"
order_idx: 1
language: "python"
track: "prompt"

# 문제 유형: ai_reading (AI 코드 읽기)
# 사용자가 AI가 짠 코드를 보고 결과를 예측하는 유형
problem_type: "ai_reading"
answer_type: "multiple_choice"

description: |
  아래 AI가 작성한 코드를 읽고 실행 결과를 예측해보세요.
  코드를 직접 실행하지 말고, 머릿속으로 흐름을 따라가보세요.

# AI가 짠 코드 (사용자에게 보여줄 코드)
ai_code: |
  nums = [1, 2, 3, 4, 5]
  result = nums[1:4]
  print(result)

# 이해 확인 질문들
questions:
  - question: "위 코드의 출력 결과는 무엇인가요?"
    answer: 1
    choices:
      - "[1, 2, 3]"
      - "[2, 3, 4]"
      - "[1, 2, 3, 4]"
      - "[3, 4, 5]"
    explanation: "nums[1:4]는 인덱스 1부터 3까지 (4 미포함) 슬라이싱합니다. 결과는 [2, 3, 4]입니다."

  - question: "nums[::2]의 결과는 무엇인가요?"
    answer: 0
    choices:
      - "[1, 3, 5]"
      - "[2, 4]"
      - "[1, 2, 3]"
      - "[3, 5]"
    explanation: "nums[::2]는 처음부터 끝까지 2칸씩 건너뛰며 슬라이싱합니다. 결과는 [1, 3, 5]입니다."

