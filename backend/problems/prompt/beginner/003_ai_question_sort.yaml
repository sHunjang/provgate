questions:
  - question: "다음 중 AI에게 가장 효과적인 질문은 무엇인가요?"
    answer: 2
    choices:
      - "정렬 알려줘"
      - "파이썬으로 정렬하는 법 알려줘"
      - "파이썬에서 정수 리스트를 내림차순으로 정렬하는 함수를 작성해줘. 입력은 [3,1,4,1,5]이고 출력은 [5,4,3,1,1]이어야 해"
      - "sorted 함수 써줘"
    explanation: |
      좋은 프롬프트의 조건:
      1. 구체적인 언어 명시 (파이썬)
      2. 정확한 요구사항 (내림차순 정렬 함수)
      3. 예시 입출력 포함
      세 번째 선택지가 이 모든 조건을 만족합니다.

  - question: "AI 답변에서 'sorted(arr, reverse=True)'를 받았습니다. 이 코드의 의미는?"
    answer: 0
    choices:
      - "arr을 내림차순으로 정렬한 새 리스트 반환"
      - "arr을 오름차순으로 정렬"
      - "arr을 직접 수정해서 내림차순 정렬"
      - "arr의 역순 인덱스 반환"
    explanation: "sorted()는 원본을 변경하지 않고 새 리스트를 반환합니다. reverse=True는 내림차순을 의미합니다."

