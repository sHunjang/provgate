description: |
  리스트를 내림차순으로 정렬하는 함수를 만들어야 합니다.
  AI에게 도움을 요청하려고 합니다.
  아래 중 가장 좋은 프롬프트를 선택하세요.

# ai_question 유형은 ai_code 없음
