description: |
  도서관 책 관리 시스템을 클래스로 구현해야 합니다.
  AI에게 도움을 요청하려고 합니다.
  아래 중 가장 좋은 프롬프트를 선택하세요.

ai_code: ""

questions:
  - question: "책 대출/반납 기능이 있는 도서관 시스템을 만들 때 AI에게 가장 효과적인 질문은?"
    answer: 2
    choices:
      - "도서관 클래스 만들어줘"
      - "파이썬으로 도서관 클래스 만들어줘"
      - "파이썬으로 도서관 책 관리 클래스를 만들어줘. Book 클래스와 Library 클래스가 필요하고, 대출(borrow), 반납(return_book), 재고확인(check_stock) 메서드가 있어야 해. 책이 없으면 '재고 없음'을 반환해줘"
      - "클래스로 도서관 만들어줘. 대출이랑 반납 기능도"
    explanation: |
      좋은 프롬프트의 조건:
      1. 필요한 클래스 명시 (Book, Library)
      2. 필요한 메서드 명시 (borrow, return_book, check_stock)
      3. 예외 처리 조건 명시 (재고 없음)
      세 번째 선택지가 이 모든 조건을 만족합니다.

  - question: "AI가 만든 클래스 코드를 받았을 때 가장 먼저 확인해야 할 것은?"
    answer: 0
    choices:
      - "내가 요청한 메서드가 모두 구현되어 있는지"
      - "코드 줄 수가 적당한지"
      - "변수 이름이 영어인지"
      - "주석이 충분히 달려있는지"
    explanation: "AI 코드를 검토할 때는 요구사항이 모두 충족됐는지가 가장 중요합니다. 메서드 누락 여부를 먼저 확인하세요."

