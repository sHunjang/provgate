title: "AI 코드 자동 병합 정책 비교하기"
description: |
    AI가 작성한 Pull Request를 어떻게 처리할지, 두 가지 정책을
    비교해서 어느 쪽이 더 나은 선택인지 판단해보세요.
    정답은 하나가 아닙니다 — 어떤 요소를 고려했는지가 중요합니다.

level: "advanced"
concept_tag: "AI 협업, 트레이드오프 판단"
problem_type: "tradeoff_judgment"
order_idx: 4
language: "python"

requirements: |
    AI가 작성한 Pull Request를 처리하는 정책을 정해야 합니다.

    A안: 자동화된 테스트만 통과하면 사람 검토 없이 자동으로 병합한다
    B안: 테스트 통과 여부와 상관없이 항상 최소 1명의 사람 승인이 필요하다

    둘 다 나름의 장단점이 있습니다. 이 상황에서 반드시 고려해야 할
    요소가 무엇인지 골라보세요.

thinking_hints:
    - "테스트가 실제로 모든 상황(엣지 케이스)을 다 검증하고 있을까요?"
    - "AI가 생성한 코드에 보안 취약점이나 은밀한 로직 오류가 섞여 있을 가능성은 없을까요?"
    - "이 프로젝트에서 배포 속도가 얼마나 중요한 가치일까요?"

questions:
    - question: "이 상황에서 반드시 고려해야 할 요소를 모두 고르세요"
      choices:
          - "테스트가 실제로 모든 엣지 케이스를 충분히 커버하고 있는가"
          - "AI가 생성한 코드에 보안 취약점이나 은밀한 로직 오류가 포함될 가능성"
          - "자동 병합으로 얻는 배포 속도 향상이 이 프로젝트에 실제로 중요한 가치인가"
          - "PR 제목에 이모지가 포함되어 있는가"
          - "저장소의 기본 브랜치 이름이 main인지 master인지"
      answers: [0, 1, 2]
      explanation: |
          테스트 통과는 "알려진 케이스를 통과했다"는 뜻이지, 모든
          엣지 케이스를 검증했다는 보장은 아닙니다. AI가 생성한 코드는
          의도치 않은 보안 취약점이나 미묘한 로직 오류를 포함할 수
          있는데, 테스트가 이를 못 잡아낼 수 있습니다. 또한 자동 병합의
          장점(속도)이 이 프로젝트에서 실제로 중요한 가치인지도 따져봐야
          합니다. PR 제목의 이모지나 브랜치 이름은 이 판단과 무관합니다.

reference_points:
    - "테스트 커버리지의 한계 (엣지 케이스 누락 가능성)"
    - "AI 생성 코드의 보안/로직 오류 가능성"
    - "배포 속도라는 가치가 프로젝트에 실제로 중요한지"
