            return
    javascript: |
        function solution(temperatures) {
            // 여기에 코드를 작성하세요
            return;
        }

test_cases:
    - input: "[[23, 19, 25, 18, 22, 20, 24]]"
      output: "[25, 18]"
    - input: "[[10, 15, 5]]"
      output: "[15, 5]"
    - input: "[[-3, -7, -1]]"
      output: "[-1, -7]"
