            # 여기에 코드를 작성하세요
            return

test_cases:
    - input: "[[85, 90, 78, 92, 88]]"
      output: "88"
    - input: "[[72, 95, 60]]"
      output: "72"
    - input: "[[50, 60, 70, 80, 90]]"
      output: "70"

hint_keywords: "sorted(), 리스트 인덱싱, 중간 인덱스 계산"
