title: "페이지네이션 설계하기"
description: |
    게시글 전체 목록을 페이지 단위로 나눠서 보여주는 기능을 만드세요.
    코드를 짜기 전에, 먼저 어떤 조건과 순서로 처리할지 직접 설계해보세요.
    정답은 없습니다 — 당신이 생각한 조건이 곧 설계입니다.

level: "intermediate"
concept_tag: "함수 설계, 데이터 관리"
problem_type: "design_implementation"
order_idx: 3
language: "python"

requirements: |
    게시글 전체 목록과 페이지 번호, 페이지당 개수를 입력받아
    해당 페이지에 보여줄 게시글 목록을 반환하는 함수를 만드세요.
    어떤 경우를 성공/실패로 처리할지는 직접 정해야 합니다.

thinking_hints:
    - "페이지 번호가 1부터 시작할까요, 0부터 시작할까요?"
    - "존재하지 않는 페이지 번호를 요청하면 어떻게 처리할까요?"
    - "페이지당 개수가 0이거나 음수면 어떻게 처리할까요?"
    - "마지막 페이지에 게시글이 페이지당 개수보다 적게 남으면 어떻게 될까요?"

reference_points:
    - "페이지 번호 유효성 검증 여부"
    - "빈 목록 처리 여부"
    - "마지막 페이지 부분 채움 처리 여부"
    - "페이지 크기 0 이하 처리 여부"

