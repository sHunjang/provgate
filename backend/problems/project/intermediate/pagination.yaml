test_cases:
    - input: '[["글1", "글2", "글3", "글4", "글5"], 1, 2]'
      output: '{"success": true, "page": 1, "items": ["글1", "글2"]}'
    - input: '[["글1", "글2", "글3", "글4", "글5"], 3, 2]'
      output: '{"success": true, "page": 3, "items": ["글5"]}'
    - input: '[["글1", "글2", "글3"], 10, 2]'
      output: '{"success": false, "message": "존재하지 않는 페이지입니다."}'
