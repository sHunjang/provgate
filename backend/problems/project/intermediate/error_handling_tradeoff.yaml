title: "에러 처리 방식 비교하기"
description: |
    파일을 읽어오는 함수를 설계할 때, 실패를 알리는 두 가지 방식을
    비교해서 어느 쪽이 더 나은 선택인지 판단해보세요.
    정답은 하나가 아닙니다 — 어떤 요소를 고려했는지가 중요합니다.

level: "intermediate"
concept_tag: "함수 설계, 트레이드오프 판단"
problem_type: "tradeoff_judgment"
order_idx: 4
language: "python"

requirements: |
    파일을 읽어오는 함수에서, 파일이 없을 때 이를 알리는 두 가지
    방식 중 하나를 선택해야 합니다.

    A안: 예외(Exception)를 던진다
    B안: 특별한 값(None)을 반환한다

    둘 다 나름의 장단점이 있습니다. 이 상황에서 반드시 고려해야 할
    요소가 무엇인지 골라보세요.

thinking_hints:
    - "호출하는 쪽에서 실수로 에러 처리를 깜빡하면 어떻게 될까요?"
    - "에러가 발생한 곳과 실제로 처리하는 곳이 코드에서 멀리 떨어져 있다면 어떨까요?"
    - "정상적인 흐름과 에러 흐름이 코드에서 뒤섞이면 가독성이 어떻게 될까요?"

questions:
    - question: "이 상황에서 반드시 고려해야 할 요소를 모두 고르세요"
      choices:
          - "호출하는 쪽에서 에러 처리를 깜빡하고 놓칠 가능성이 있는가"
          - "에러가 발생한 위치와 처리하는 위치가 코드에서 멀리 떨어져 있어도 자연스럽게 전달되는가"
          - "정상 흐름과 에러 흐름을 코드 구조상 명확히 구분할 수 있는가"
          - "함수 이름이 몇 글자인가"
          - "파일이 저장된 디스크가 SSD인지 HDD인지"
      answers: [0, 1, 2]
      explanation: |
          None을 반환하는 방식(B안)은 호출하는 쪽이 반환값을 확인하지
          않으면 에러가 조용히 무시될 위험이 있습니다. 반면 예외(A안)는
          처리하지 않으면 프로그램이 즉시 멈추므로 놓칠 위험이 적고,
          발생 지점에서 멀리 떨어진 곳에서 처리해도 자연스럽게 전파됩니다.
          또한 예외는 정상 흐름과 에러 흐름을 코드 구조상(try/except)
          명확히 분리해줍니다. 함수 이름 길이나 디스크 종류는 이 판단과
          무관합니다.

reference_points:
    - "호출자의 에러 처리 누락 가능성"
    - "에러 전파(발생 지점과 처리 지점의 거리)"
    - "정상 흐름과 에러 흐름의 코드 구조상 분리"
