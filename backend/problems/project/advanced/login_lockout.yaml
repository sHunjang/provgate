title: "로그인 시도 제한 정책 비교하기"
description: |
    로그인 실패가 반복될 때 계정을 어떻게 보호할지, 두 가지 방식을
    비교해서 어느 쪽이 더 나은 선택인지 판단해보세요.
    정답은 하나가 아닙니다 — 어떤 요소를 고려했는지가 중요합니다.

level: "advanced"
concept_tag: "함수 설계, 트레이드오프 판단"
problem_type: "tradeoff_judgment"
order_idx: 4
language: "python"

requirements: |
    다음 두 가지 로그인 보안 정책 중 하나를 선택해야 합니다.

    A안: 5회 실패 시 즉시 24시간 계정 잠금
    B안: 5회 실패 시 5분만 대기시킨 뒤 재시도 허용

    둘 다 나름의 장단점이 있습니다. 이 상황에서 반드시 고려해야 할
    요소가 무엇인지 골라보세요.

thinking_hints:
    - "보안이 강할수록 정상 사용자는 불편해지지 않을까요?"
    - "비밀번호를 실수로 잘못 입력하는 경우도 자주 있지 않을까요?"
    - "공격자가 계정을 탈취하려고 시도하는 경우는 어떨까요?"

questions:
    - question: "이 상황에서 반드시 고려해야 할 요소를 모두 고르세요"
      choices:
          - "보안과 사용자 경험 사이의 균형"
          - "정상 사용자의 단순 실수(오타 등) 가능성"
          - "계정 탈취 시도를 늦추는 효과"
          - "UI 버튼의 색상 선택"
          - "서버가 사용하는 데이터베이스 종류"
      answers: [0, 1, 2]
      explanation: |
          로그인 제한 정책은 보안(계정 탈취 방지)과 사용성(정상 사용자의
          불편함) 사이의 트레이드오프입니다. 너무 엄격하면(A안) 오타 한
          번으로 24시간 동안 계정을 못 쓰게 되고, 너무 느슨하면(B안)
          공격자가 5분마다 계속 시도할 수 있습니다. UI 색상이나 DB
          종류는 이 판단과 무관합니다.

reference_points:
    - "보안과 사용자 경험 사이의 균형"
    - "정상 사용자의 단순 실수(오타 등) 가능성"
    - "계정 탈취 시도를 늦추는 효과"
